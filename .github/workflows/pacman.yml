name: Generate Pacman
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["master", "main"] }

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate Pacman
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          github_user_name: Rian58

      - name: Prepare Output
        run: |
          mkdir -p dist
          # Move the generated file to dist. The action typically matches the username or a standard name.
          # We'll try to find any SVG it made.
          mv *.svg dist/pacman-contribution-graph.svg || true

      - name: Push to Output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
